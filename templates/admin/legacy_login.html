{% load static %}
<!DOCTYPE html>
<html lang="en-us" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | ShopToolnix</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
        }
        .login-wrapper {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: inline-block;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
            margin-bottom: 8px;
        }
        .brand-subtitle {
            color: #94a3b8;
            font-size: 15px;
            font-weight: 500;
        }
        .form-group { margin-bottom: 24px; }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-control {
            width: 100%;
            padding: 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            outline: none;
            border-color: #38bdf8;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }
        .form-control::placeholder { color: #475569; }
        
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }
        .btn-submit:active {
            transform: translateY(0);
        }
        
        .errornote {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .errornote::before {
            content: "⚠️";
        }
    </style>
</head>
<body class="login">

<div class="login-wrapper">
    <div class="login-card">
        <div class="logo-container">
            <div class="logo-icon">🛡️</div>
            <div class="brand-title">ShopToolnix</div>
            <div class="brand-subtitle">Secure Administration</div>
        </div>

        {% if error %}
        <div class="errornote">Authentication failed. Please verify your secure credentials.</div>
        {% endif %}

        <form action="" method="post" id="login-form">
            <!-- No CSRF token to trap bots that ignore cookies -->
            
            <div class="form-group">
                <label for="id_username">Email Address</label>
                <input type="text" name="username" class="form-control" autofocus required id="id_username" placeholder="admin@example.com">
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" class="form-control" required id="id_password" placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-submit">Authenticate Securely</button>
        </form>
    </div>
</div>

</body>
</html>
