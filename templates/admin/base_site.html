{% extends "admin/base.html" %}
{% load i18n static %}

{% block title %}{{ title }} | {{ site_title|default:_('Django site admin') }}{% endblock %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}">
        🛡️ {{ site_header|default:_('Django administration') }}
    </a>
</div>
{% endblock %}

{% block extrastyle %}
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<style>
    /* Dark Premium Styling Overrides leveraging Django's CSS Variables */
    :root {
        --primary: #38bdf8;
        --secondary: #0f172a;
        --accent: #6366f1;
        --primary-fg: #fff;
        
        --body-fg: #f8fafc;
        --body-bg: #1e293b;
        --body-quiet-color: #94a3b8;
        --body-loud-color: #ffffff;
        
        --header-color: #ffffff;
        --header-branding-color: #ffffff;
        --header-bg: #0f172a;
        --header-link-color: #38bdf8;
        
        --breadcrumbs-fg: #cbd5e1;
        --breadcrumbs-link-fg: #f8fafc;
        --breadcrumbs-bg: #0f172a;
        
        --link-fg: #38bdf8;
        --link-hover-color: #7dd3fc;
        --link-selected-fg: #ffffff;
        
        --button-fg: #ffffff;
        --button-bg: #38bdf8;
        --button-hover-bg: #0284c7;
        
        --default-button-bg: #6366f1;
        --default-button-hover-bg: #4f46e5;
        
        --close-button-bg: #ef4444;
        --close-button-hover-bg: #dc2626;
        
        --delete-button-bg: #ef4444;
        --delete-button-hover-bg: #dc2626;
        
        --error-fg: #fca5a5;
        --message-success-bg: rgba(16, 185, 129, 0.1);
        --message-warning-bg: rgba(245, 158, 11, 0.1);
        --message-error-bg: rgba(239, 68, 68, 0.1);
        
        --darkened-bg: #0f172a;
        --selected-bg: #334155;
        --selected-row: #334155;
        --border-color: #334155;
    }
    
    body {
        font-family: 'Inter', sans-serif;
    }
    
    #header {
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    #branding h1 {
        font-weight: 800;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    
    /* Enhance forms and tables */
    input[type=text], input[type=password], input[type=email], input[type=url], input[type=number], input[type=tel], textarea, select, .vTextField {
        background-color: #0f172a;
        border: 1px solid #334155;
        color: #f8fafc;
        border-radius: 8px;
        padding: 8px 12px;
    }
    
    input:focus, textarea:focus, select:focus {
        border-color: #38bdf8;
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
    }
    
    .module {
        background: #0f172a;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #334155;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
    }
    
    .module h2, .module caption, .inline-group h2 {
        background: rgba(255,255,255,0.05);
        color: #f8fafc;
        font-weight: 600;
        padding: 12px 16px;
    }
</style>
{% endblock %}
