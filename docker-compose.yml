version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=shop_toolnix
      - POSTGRES_USER=toolnix_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-securepassword123}
    restart: always

  web:
    build: .
    command: >
      bash -c "python manage.py collectstatic --noinput &&
               python manage.py migrate &&
               gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - ./media:/app/media
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgres://toolnix_user:${DB_PASSWORD:-securepassword123}@db:5432/shop_toolnix
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=shop.toolnix.pro,localhost,127.0.0.1
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:

