server {
    listen 80;
    server_name shop.toolnix.pro;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name shop.toolnix.pro;

    # SSL Certificates (Managed by Certbot usually)
    # ssl_certificate /etc/letsencrypt/live/shop.toolnix.pro/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/shop.toolnix.pro/privkey.pem;
    
    # Increase max upload size if your app requires large uploads
    client_max_body_size 50M;

    # Serve media files directly through Nginx for better performance
    location /media/ {
        alias /var/www/shop_toolnix/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
